<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تقرير المبيعات الاحترافي</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #1d6fcf; --blue-lt: #dbeafe;
  --green: #16a34a; --green-lt: #dcfce7;
  --red: #dc2626; --red-lt: #fee2e2;
  --amber: #d97706; --amber-lt: #fef3c7;
  --purple: #7c3aed; --purple-lt: #ede9fe;
  --teal: #0d9488; --teal-lt: #ccfbf1;
  --pink: #db2777; --pink-lt: #fce7f3;
  --bg: #f8fafc; --card: #fff; --border: #e2e8f0;
  --text: #1e293b; --muted: #64748b; --light: #f1f5f9;
}
body { font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 16px; font-size: 14px; }
.app-header { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; padding: 14px 18px; margin-bottom: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.brand-wrap { display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, var(--blue), var(--purple)); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.brand-name { font-size: 16px; font-weight: 800; color: var(--text); }
.brand-sub { font-size: 11px; color: var(--muted); }
.hdr-divider { width: 1px; height: 28px; background: var(--border); }
.hdr-badge { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 700; font-family: ui-monospace, monospace; }
.badge-version { background: var(--blue-lt); color: var(--blue); border: 1px solid #93c5fd; }
.badge-readonly { background: var(--green-lt); color: var(--green); border: 1px solid #86efac; }
.hdr-right { margin-right: auto; display: flex; gap: 8px; flex-wrap: wrap; }
.ctrl-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding: 12px 16px; margin-bottom: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.load-btn { padding: 8px 22px; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 700; background: var(--blue); color: #fff; }
.load-btn:disabled { opacity: .5; cursor: not-allowed; }
.progress-wrap { flex: 1; min-width: 120px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; width: 0%; background: var(--blue); transition: width .3s; }
.status-text { font-size: 12px; color: var(--muted); }
.fx-notice { background: #eff6ff; border: 1px solid #bfdbfe; color: #1e3a8a; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 12.5px; line-height: 1.5; }
.fx-notice strong { color: #1d4ed8; }
.fx-notice code { background: #dbeafe; color: #1e40af; padding: 1px 6px; border-radius: 4px; font-size: 11.5px; font-family: ui-monospace, monospace; }
.filter-panel { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
.filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 180px; }
.filter-group label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.filter-group input, .filter-group select { padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; color: var(--text); background: #fff; outline: none; font-family: inherit; }
.filter-group input:focus, .filter-group select:focus { border-color: var(--blue); }
.search-wrap { position: relative; }
.search-wrap input { padding-left: 30px; }
.clear-search-btn { position: absolute; left: 6px; top: 50%; transform: translateY(-50%); background: var(--red); color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 11px; display: none; align-items: center; justify-content: center; line-height: 1; }
.clear-search-btn.show { display: flex; }
.count-info { font-size: 10px; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 6px; }
.count-info.has-match { color: var(--green); font-weight: 600; }
.count-info.no-match { color: var(--red); font-weight: 600; }
.apply-btn { padding: 7px 20px; background: var(--blue); color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; align-self: flex-end; }
.apply-btn:hover { opacity: .9; }
.clear-btn { padding: 7px 14px; background: var(--light); color: var(--muted); border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; align-self: flex-end; }
.export-btn { padding: 7px 16px; color: #fff; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn-excel { background: var(--green); }
.btn-excel:hover { background: #15803d; }
.btn-preview { background: var(--blue); }
.btn-preview:hover { background: #1558a8; }
.summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 18px; }
.summary-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.05); }
.sc-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; }
.sc-value { font-size: 20px; font-weight: 800; color: var(--text); }
.sc-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.summary-card.blue { border-top: 3px solid var(--blue); }
.summary-card.green { border-top: 3px solid var(--green); }
.summary-card.amber { border-top: 3px solid var(--amber); }
.summary-card.purple { border-top: 3px solid var(--purple); }
.summary-card.teal { border-top: 3px solid var(--teal); }
.summary-card.pink { border-top: 3px solid var(--pink); }
.section-header { font-size: 16px; font-weight: 800; color: var(--text); padding: 10px 0 8px; border-bottom: 2px solid var(--border); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.section-header .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 700; }
.chart-block { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 18px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.chart-block-title { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
.chart-block-title h2 { font-size: 15px; font-weight: 800; color: var(--text); display: flex; align-items: center; gap: 8px; }
.toggle-bar { display: flex; gap: 4px; background: var(--light); padding: 4px; border-radius: 8px; border: 1px solid var(--border); }
.toggle-btn { padding: 5px 14px; border: none; border-radius: 5px; font-size: 12px; font-weight: 700; cursor: pointer; background: transparent; color: var(--muted); }
.toggle-btn.active { background: var(--blue); color: #fff; box-shadow: 0 1px 3px rgba(29,111,207,.35); }
.canvas-container { position: relative; height: 280px; }
.canvas-container.tall { height: 340px; }
.stats-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); }
.stat-item { flex: 1; min-width: 110px; text-align: center; background: var(--light); border-radius: 8px; padding: 10px; }
.stat-label { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
.stat-val { font-size: 15px; font-weight: 800; color: var(--text); margin-top: 3px; }
.stat-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.data-table th { background: var(--light); padding: 9px 10px; text-align: right; font-weight: 700; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); }
.data-table td { padding: 8px 10px; border-bottom: 1px solid #f1f5f9; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #f8fafc; }
.data-table tr.top-row td { background: #f0fdf4; }
.num { text-align: left; direction: ltr; font-family: 'Consolas', monospace; }
.pct-bar-wrap { display: flex; align-items: center; gap: 8px; }
.pct-bar { height: 6px; border-radius: 3px; min-width: 2px; }
.pct-txt { font-size: 11px; color: var(--muted); white-space: nowrap; min-width: 50px; }
.insights-block { background: linear-gradient(135deg, #f0f9ff, #e0f2fe); border: 1px solid #7dd3fc; border-radius: 12px; padding: 18px; margin-bottom: 18px; }
.insights-block h3 { font-size: 14px; font-weight: 800; color: #0369a1; margin-bottom: 12px; }
.insight-item { display: flex; gap: 10px; align-items: flex-start; padding: 10px 14px; margin-bottom: 8px; background: #fff; border-radius: 8px; border: 1px solid #bae6fd; }
.insight-icon { font-size: 18px; flex-shrink: 0; }
.insight-text { font-size: 13px; line-height: 1.6; color: var(--text); }
.insight-text strong { color: #0369a1; }
.filter-info { background: #faf5ff; border-right: 4px solid var(--purple); padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 13px; color: var(--text); }
.filter-info b { color: #6d28d9; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); background: var(--card); border-radius: 10px; border: 1px solid var(--border); }
.empty-state .ico { font-size: 48px; margin-bottom: 12px; }
.error-box { color: var(--red); background: var(--red-lt); border: 1px solid #fca5a5; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 14px; }
.top-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 18px; }
@media (max-width: 900px) { .top-grid { grid-template-columns: 1fr; } }
.top-block { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.top-block-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
.debug { background: #1e293b; color: #4ade80; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 11px; max-height: 200px; overflow: auto; margin-top: 10px; direction: ltr; text-align: left; display: none; }
.loading-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9999; display: none; align-items: center; justify-content: center; }
.loading-overlay.show { display: flex; }
.loading-box { background: white; padding: 30px 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
.loading-spinner { width: 50px; height: 50px; border: 4px solid #e2e8f0; border-top-color: var(--blue); border-radius: 50%; margin: 0 auto 15px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text); font-weight: 600; }
</style>
</head>
<body>

<div class="app-header">
  <div class="brand-wrap">
    <div class="brand-icon">📊</div>
    <div>
      <div class="brand-name">تقرير المبيعات الاحترافي</div>
      <div class="brand-sub">تحليل تفاعلي مع رسوم بيانية</div>
    </div>
  </div>
  <div class="hdr-divider"></div>
  <span class="hdr-badge badge-version">v2.0</span>
  <span class="hdr-badge badge-readonly">قراءة فقط</span>
  <div class="hdr-right">
    <button class="export-btn btn-preview" onclick="openPrintPreview()">🖨️ معاينة وطباعة</button>
    <button class="export-btn btn-excel" onclick="exportToExcelReal()">📥 تصدير Excel</button>
  </div>
</div>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllData()">⬇ تحميل البيانات</button>
  <div class="progress-wrap"><div class="progress-bar" id="prog-bar"></div></div>
  <span class="status-text" id="status-text">اضغط على "تحميل البيانات" للبدء</span>
  <button class="clear-btn" onclick="toggleDebug()">🐛 السجل</button>
</div>

<div class="fx-notice">
  💱 جميع المبالغ معروضة بالعملة الأساسية. فواتير العملات الأجنبية يتم تحويلها تلقائيًا باستخدام <code>exchangeRate</code> لكل فاتورة.
</div>

<div id="debug" class="debug"></div>

<div id="app"></div>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-box">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">جاري المعالجة...</div>
  </div>
</div>

<script>
var ALL_INVOICES = [];
var customersMap = {};
var itemsMap = {};
var allCustomersList = [];
var allItemsList = [];
var dataLoaded = false;
var chartInstances = {};
var logs = [];
var LAST_STATS = null;
var LAST_FILTERED = null;

var FILTER_STATE = {
  dateFrom: '', dateTo: '', customer: '', customerSearch: '',
  item: '', itemSearch: '', groupBy: 'day'
};

function log(m){
  var l = '['+new Date().toLocaleTimeString('en-US')+'] '+m;
  logs.push(l); console.log(l);
  var d = document.getElementById('debug');
  if(d) d.textContent = logs.slice(-50).join('\n');
}
function toggleDebug(){
  var d = document.getElementById('debug');
  d.style.display = d.style.display === 'none' || !d.style.display ? 'block' : 'none';
}
function escHtml(s){
  return String(s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function fmt(n){ return Number(n||0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}); }
function fmtQty(n){ return Number(n||0).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 3}); }
function fmtShort(v){
  var n = Math.abs(Number(v));
  if(n >= 1000000) return (v/1000000).toFixed(1) + 'M';
  if(n >= 1000) return (v/1000).toFixed(1) + 'K';
  return Number(v).toFixed(0);
}
function setStatus(text){ document.getElementById('status-text').textContent = text; }
function hexToRgba(hex, alpha){
  var r = parseInt(hex.slice(1,3), 16);
  var g = parseInt(hex.slice(3,5), 16);
  var b = parseInt(hex.slice(5,7), 16);
  return 'rgba('+r+','+g+','+b+','+alpha+')';
}
function showLoading(text){
  document.getElementById('loading-text').textContent = text || 'جاري المعالجة...';
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading(){
  document.getElementById('loading-overlay').classList.remove('show');
}

var ARABIC_MONTHS = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
var CHART_COLORS = ['#1d6fcf','#7c3aed','#16a34a','#d97706','#dc2626','#0d9488','#db2777','#ea580c','#0891b2','#65a30d','#9333ea','#b45309'];

function apiRequest(path, timeout){
  return new Promise(function(resolve, reject){
    var rid = 'r' + Date.now() + '_' + Math.floor(Math.random()*100000);
    log('→ ' + path);
    var done = false;
    var handler = function(e){
      if(done) return;
      if(e.data && e.data.requestId === rid){
        done = true;
        window.removeEventListener('message', handler);
        clearTimeout(tm);
        if(e.data.error) reject(e.data.error);
        else resolve(e.data.body);
      }
    };
    var tm = setTimeout(function(){
      if(done) return;
      done = true;
      window.removeEventListener('message', handler);
      reject('timeout');
    }, timeout || 120000);
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: 'api-request', method: 'GET', path: '/api4/' + path, requestId: rid }, '*');
  });
}

function loadAllData(){
  var btn = document.getElementById('load-btn');
  var bar = document.getElementById('prog-bar');
  btn.disabled = true;
  btn.textContent = 'جاري التحميل...';
  bar.style.width = '0%';
  log('═══ بدء التحميل ═══');
  setStatus('🔄 تحميل العملاء...');
  bar.style.width = '20%';
  return apiRequest('customer-batch?pageSize=5000')
  .then(function(d){
    customersMap = {};
    (d.items||[]).forEach(function(c){ customersMap[c.key] = c.item.name || 'بدون اسم'; });
    allCustomersList = [];
    for(var k in customersMap) allCustomersList.push([k, customersMap[k]]);
    allCustomersList.sort(function(a,b){ return a[1].localeCompare(b[1], 'ar'); });
    log('✅ عملاء: ' + allCustomersList.length);
    setStatus('🔄 تحميل الأصناف...');
    bar.style.width = '40%';
    return apiRequest('inventory-item-batch?pageSize=5000');
  })
  .then(function(d){
    itemsMap = {};
    (d.items||[]).forEach(function(it){
      itemsMap[it.key] = { name: it.item.itemName || 'صنف', code: it.item.itemCode || '', unit: it.item.unitName || '' };
    });
    allItemsList = [];
    for(var k in itemsMap){
      var info = itemsMap[k];
      var label = (info.code ? info.code + ' - ' : '') + info.name;
      allItemsList.push([k, label, info.code, info.name]);
    }
    allItemsList.sort(function(a,b){ return a[1].localeCompare(b[1], 'ar'); });
    log('✅ أصناف: ' + allItemsList.length);
    setStatus('🔄 تحميل فواتير البيع...');
    bar.style.width = '70%';
    return apiRequest('sales-invoice-batch?pageSize=10000');
  })
  .then(function(d){
    ALL_INVOICES = d.items || [];
    log('✅ فواتير بيع: ' + ALL_INVOICES.length);
    bar.style.width = '100%';
    setStatus('✅ تم التحميل: ' + ALL_INVOICES.length + ' فاتورة');
    btn.textContent = '↺ إعادة التحميل';
    btn.disabled = false;
    dataLoaded = true;
    var today = new Date();
    var yearAgo = new Date();
    yearAgo.setFullYear(today.getFullYear() - 1);
    FILTER_STATE.dateTo = today.toISOString().substring(0, 10);
    FILTER_STATE.dateFrom = yearAgo.toISOString().substring(0, 10);
    renderWithFilters();
  })
  .catch(function(err){
    log('✗ فشل: ' + err);
    setStatus('❌ فشل: ' + err);
    btn.textContent = '↺ إعادة المحاولة';
    btn.disabled = false;
    document.getElementById('app').innerHTML = '<div class="error-box">⚠ خطأ: ' + escHtml(String(err)) + '</div>';
  });
}

function calcLineNet(line){
  var qty = line.qty;
  if(qty == null || qty === 0) qty = 1;
  var price = line.salesUnitPrice || 0;
  var discount = line.discountAmount || (qty * price * (line.discountPercentage || 0) / 100);
  return (qty * price) - discount;
}
function applyExchangeRate(amount, rate, isInverse){
  if(!rate || rate === 0 || rate === 1) return amount;
  return isInverse ? (amount / rate) : (amount * rate);
}
function calcInvoiceTotal(inv){
  var lines = inv.item.lines || [];
  var total = 0;
  lines.forEach(function(l){ total += calcLineNet(l); });
  return applyExchangeRate(total, inv.item.exchangeRate, inv.item.exchangeRateIsInverse);
}
function getInvoiceDate(inv){ return (inv.item.issueDate || '').substring(0, 10); }

function readFilters(){
  var df = document.getElementById('flt-date-from');
  var dt = document.getElementById('flt-date-to');
  var cs = document.getElementById('flt-customer');
  var it = document.getElementById('flt-item');
  var gb = document.getElementById('flt-groupby');
  if(df) FILTER_STATE.dateFrom = df.value;
  if(dt) FILTER_STATE.dateTo = dt.value;
  if(cs) FILTER_STATE.customer = cs.value;
  if(it) FILTER_STATE.item = it.value;
  if(gb) FILTER_STATE.groupBy = gb.value;
}

function filterInvoices(){
  return ALL_INVOICES.filter(function(inv){
    var d = getInvoiceDate(inv);
    if(!d) return false;
    if(FILTER_STATE.dateFrom && d < FILTER_STATE.dateFrom) return false;
    if(FILTER_STATE.dateTo && d > FILTER_STATE.dateTo) return false;
    if(FILTER_STATE.customer && inv.item.customer !== FILTER_STATE.customer) return false;
    if(FILTER_STATE.item){
      var hasItem = (inv.item.lines || []).some(function(l){ return l.item === FILTER_STATE.item; });
      if(!hasItem) return false;
    }
    return true;
  });
}

function clearAllFilters(){
  FILTER_STATE = { dateFrom:'', dateTo:'', customer:'', customerSearch:'', item:'', itemSearch:'', groupBy:'day' };
  renderWithFilters();
}
function applyFilters(){ renderWithFilters(); }

function computeStats(invoices){
  var stats = {
    totalSales: 0, invoiceCount: invoices.length,
    customers: {}, items: {},
    dailyMap: {}, monthlyMap: {}, yearlyMap: {}, weeklyMap: {},
    minDate: null, maxDate: null
  };
  var itemFilter = FILTER_STATE.item;
  invoices.forEach(function(inv){
    var date = getInvoiceDate(inv);
    if(!date) return;
    if(!stats.minDate || date < stats.minDate) stats.minDate = date;
    if(!stats.maxDate || date > stats.maxDate) stats.maxDate = date;
    var invTotalRaw = 0;
    var fxRate = inv.item.exchangeRate;
    var fxInverse = inv.item.exchangeRateIsInverse;
    (inv.item.lines || []).forEach(function(line){
      var lineNet = calcLineNet(line);
      var lineNetLocal = applyExchangeRate(lineNet, fxRate, fxInverse);
      if(itemFilter && line.item !== itemFilter) return;
      invTotalRaw += lineNetLocal;
      if(line.item){
        if(!stats.items[line.item]){
          var info = itemsMap[line.item] || {name:'صنف غير معروف', code:'', unit:''};
          stats.items[line.item] = { info: info, qty: 0, total: 0, invCount: 0 };
        }
        var qty = line.qty;
        if(qty == null || qty === 0) qty = 1;
        stats.items[line.item].qty += Math.abs(qty);
        stats.items[line.item].total += lineNetLocal;
        stats.items[line.item].invCount += 1;
      }
    });
    if(itemFilter && invTotalRaw === 0) return;
    stats.totalSales += invTotalRaw;
    var custId = inv.item.customer || '__no_customer__';
    var custName = inv.item.customer ? (customersMap[inv.item.customer] || 'عميل غير معروف') : 'بدون عميل';
    if(!stats.customers[custId]){
      stats.customers[custId] = { name: custName, total: 0, count: 0 };
    }
    stats.customers[custId].total += invTotalRaw;
    stats.customers[custId].count += 1;
    stats.dailyMap[date] = (stats.dailyMap[date] || 0) + invTotalRaw;
    var ym = date.substring(0, 7);
    stats.monthlyMap[ym] = (stats.monthlyMap[ym] || 0) + invTotalRaw;
    var y = date.substring(0, 4);
    stats.yearlyMap[y] = (stats.yearlyMap[y] || 0) + invTotalRaw;
    var dObj = new Date(date);
    var weekKey = y + '-W' + String(getISOWeek(dObj)).padStart(2, '0');
    stats.weeklyMap[weekKey] = (stats.weeklyMap[weekKey] || 0) + invTotalRaw;
  });
  stats.avgInvoice = stats.invoiceCount ? stats.totalSales / stats.invoiceCount : 0;
  stats.uniqueCustomers = Object.keys(stats.customers).length;
  stats.uniqueItems = Object.keys(stats.items).length;
  stats.activeDays = Object.keys(stats.dailyMap).length;
  stats.avgDaily = stats.activeDays ? stats.totalSales / stats.activeDays : 0;
  return stats;
}

function getISOWeek(date){
  var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  var dayNum = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dayNum);
  var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
}

function destroyCharts(){
  for(var k in chartInstances){
    try { chartInstances[k].destroy(); } catch(e) {}
    delete chartInstances[k];
  }
}

function renderWithFilters(){
  if(!dataLoaded) return;
  destroyCharts();
  readFilters();
  var app = document.getElementById('app');
  var filtered = filterInvoices();
  var html = '';
  html += buildFilterPanel();
  html += buildFilterInfo(filtered.length);
  if(!filtered.length){
    html += '<div class="empty-state"><div class="ico">📭</div><h3>لا توجد فواتير</h3></div>';
    app.innerHTML = html;
    attachFilterListeners();
    LAST_STATS = null; LAST_FILTERED = null;
    return;
  }
  var stats = computeStats(filtered);
  LAST_STATS = stats; LAST_FILTERED = filtered;
  html += buildSummaryCards(stats);
  html += buildRevenueChart(filtered);
  html += buildTopSection(stats);
  html += buildItemsAnalysis(stats);
  html += buildInsights(stats, filtered);
  app.innerHTML = html;
  attachFilterListeners();
  buildAllCharts(filtered, stats);
}

function buildRevenueEvolutionChart(stats){
  var canvas = document.getElementById('chart_revenue');
  if(!canvas) return;
  var gb = FILTER_STATE.groupBy;
  var map = stats.dailyMap;
  if(gb === 'week') map = stats.weeklyMap;
  if(gb === 'month') map = stats.monthlyMap;
  if(gb === 'year') map = stats.yearlyMap;
  var labels = [], values = [];
  if(gb === 'day' && stats.minDate && stats.maxDate){
    var d1 = new Date(stats.minDate);
    var d2 = new Date(stats.maxDate);
    for(var d = new Date(d1); d <= d2; d.setDate(d.getDate()+1)){
      var key = d.toISOString().substring(0,10);
      labels.push(key); values.push(map[key] || 0);
    }
  } else {
    var sorted = Object.keys(map).sort();
    labels = sorted;
    values = sorted.map(function(k){ return map[k]; });
    if(gb === 'month'){
      labels = labels.map(function(k){ var p = k.split('-'); return ARABIC_MONTHS[parseInt(p[1])-1] + ' ' + p[0]; });
    }
  }
  var total = values.reduce(function(a,b){ return a+b; }, 0);
  var avg = values.length ? total / values.length : 0;
  var maxV = Math.max.apply(null, values);
  var maxIdx = values.indexOf(maxV);
  var maxLabel = labels[maxIdx] || '-';
  var statsRow = document.getElementById('rev-stats');
  if(statsRow){
    var titles = { day:'يوم', week:'أسبوع', month:'شهر', year:'سنة' };
    statsRow.innerHTML = '<div class="stat-item"><div class="stat-label">إجمالي</div><div class="stat-val">'+fmt(total)+'</div><div class="stat-sub">'+values.length+' '+titles[gb]+'</div></div>'
      + '<div class="stat-item"><div class="stat-label">متوسط/'+titles[gb]+'</div><div class="stat-val">'+fmt(avg)+'</div></div>'
